name: Signed Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.0.1)'
        required: true

defaults:
  run:
    working-directory: android-browser

jobs:
  signed_release:
    name: Build Signed Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode and save keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > app/velo_release.jks

      - name: Build Signed Release APK
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=velo_release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            --no-daemon --stacktrace

      - name: Clean up keystore
        if: always()
        run: rm -f app/velo_release.jks

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: velo-browser-release-signed
          path: android-browser/app/build/outputs/apk/release/app-release.apk
          retention-days: 90
          if-no-files-found: error

      - name: Create GitHub Release with Signed APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android-browser/app/build/outputs/apk/release/app-release.apk
          name: Velo Browser ${{ github.ref_name }}
          body: |
            ## Velo Browser ${{ github.ref_name }} — Production Release

            ### Features
            - Multi-tab browsing with isolated WebView per tab (instant switching)
            - Multi-profile browsing with isolated cookie sessions
            - Built-in ad blocker (EasyList-based)
            - Chrome-style tab switcher with incognito/normal grouping
            - Full settings system: JavaScript, Images, Desktop Mode, Dark Mode, Ad Blocker, Safe Browsing, Search Engine, Homepage, Language
            - English & French language support
            - Download manager with notifications
            - Ultra Fast Mode
            - HTTPS enforcement & Safe Browsing
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
