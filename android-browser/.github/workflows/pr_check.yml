name: PR Quality Check

on:
  pull_request:
    branches:
      - main
      - develop

defaults:
  run:
    working-directory: android-browser

jobs:
  check:
    name: Validate PR Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Check build compiles
        run: ./gradlew compileDebugKotlin --no-daemon --stacktrace

      - name: Run Lint
        run: ./gradlew lintDebug --no-daemon

      - name: Upload Lint Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-lint-results
          path: android-browser/app/build/reports/lint-results-debug.html
          retention-days: 3
