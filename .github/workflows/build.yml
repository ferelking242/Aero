name: Build Aero Browser APK

  on:
    push:
      branches:
        - main
    workflow_dispatch:

  defaults:
    run:
      working-directory: android-browser

  jobs:
    build:
      name: Build Debug & Release APK
      runs-on: ubuntu-latest

      steps:
        - name: Checkout source code
          uses: actions/checkout@v4

        - name: Set up JDK 17
          uses: actions/setup-java@v4
          with:
            java-version: '17'
            distribution: 'temurin'

        - name: Setup Gradle
          uses: gradle/actions/setup-gradle@v4
          with:
            cache-read-only: false

        - name: Grant execute permission for gradlew
          run: chmod +x gradlew

        - name: Build Debug APK
          run: ./gradlew assembleDebug --stacktrace --no-daemon
          env:
            GRADLE_OPTS: "-Dorg.gradle.workers.max=2"

        - name: Build Release APK (unsigned)
          run: ./gradlew assembleRelease --stacktrace --no-daemon
          env:
            GRADLE_OPTS: "-Dorg.gradle.workers.max=2"

        - name: Upload Debug APK
          uses: actions/upload-artifact@v4
          with:
            name: aero-browser-debug-${{ github.sha }}
            path: android-browser/app/build/outputs/apk/debug/app-debug.apk
            retention-days: 30
            if-no-files-found: error

        - name: Upload Release APK (unsigned)
          uses: actions/upload-artifact@v4
          with:
            name: aero-browser-release-unsigned-${{ github.sha }}
            path: android-browser/app/build/outputs/apk/release/app-release-unsigned.apk
            retention-days: 30
            if-no-files-found: error

        - name: Upload Build Logs on Failure
          if: failure()
          uses: actions/upload-artifact@v4
          with:
            name: build-logs-${{ github.sha }}
            path: android-browser/app/build/reports/
            retention-days: 7

    release:
      name: Create GitHub Release
      runs-on: ubuntu-latest
      needs: build
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      permissions:
        contents: write

      steps:
        - name: Checkout source code
          uses: actions/checkout@v4

        - name: Download Debug APK artifact
          uses: actions/download-artifact@v4
          with:
            name: aero-browser-debug-${{ github.sha }}
            path: apks/

        - name: Get version from build.gradle.kts
          id: get_version
          working-directory: android-browser
          run: |
            VERSION=$(grep 'versionName' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "tag=v${VERSION}-$(date +%Y%m%d%H%M)" >> $GITHUB_OUTPUT

        - name: Create Release
          uses: softprops/action-gh-release@v2
          with:
            tag_name: ${{ steps.get_version.outputs.tag }}
            name: Aero Browser ${{ steps.get_version.outputs.version }}
            body: |
              ## Aero Browser ${{ steps.get_version.outputs.version }}

              ### What's included
              - TRUE multi-process isolated tabs (up to 4) with separate cookies, localStorage, session & cache
              - Tabs always active — never paused in background, JS timers kept alive
              - Normal tabs with shared session (lightweight)
              - Built-in ad blocker with bundled EasyList rules
              - Chrome-style tab switcher with Normal / Incognito / Isolated sections
              - Full settings system (JavaScript, images, desktop mode, dark mode, etc.)
              - Multi-language support (English & French)
              - Download manager with notification support
              - Safe browsing & HTTPS enforcement
              - Ultra Fast Mode (disables images and heavy scripts)
              - Privacy / Incognito mode

              ### Installation
              Download `app-debug.apk` and install on your Android device (API 24+).
              You may need to enable **Install from unknown sources** in your device settings.

              > Built from commit: `${{ github.sha }}`
            files: apks/app-debug.apk
            token: ${{ secrets.GITHUB_TOKEN }}
            draft: false
            prerelease: false
  