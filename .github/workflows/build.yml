name: Build Velo Browser APK

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
          cache-read-only: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.workers.max=2"

      - name: Build Release APK (unsigned)
        run: gradle assembleRelease --stacktrace --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.workers.max=2"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: velo-browser-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload Release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: velo-browser-release-unsigned-${{ github.sha }}
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload Build Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.sha }}
          path: app/build/reports/
          retention-days: 7

  lint:
    name: Run Lint Checks
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Lint
        run: gradle lint --no-daemon

      - name: Upload Lint Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report-${{ github.sha }}
          path: app/build/reports/lint-results-debug.html
          retention-days: 7

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Download Debug APK artifact
        uses: actions/download-artifact@v4
        with:
          name: velo-browser-debug-${{ github.sha }}
          path: apks/

      - name: Get version from build.gradle.kts
        id: get_version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}-$(date +%Y%m%d%H%M)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          name: Velo Browser ${{ steps.get_version.outputs.version }}
          body: |
            ## Velo Browser ${{ steps.get_version.outputs.version }}

            ### What's included
            - Per-tab WebView isolation (separate session per tab — instant switching)
            - Multi-profile browsing (separate cookie sessions per account)
            - Built-in ad blocker with bundled EasyList rules
            - Chrome-style tab switcher with Tabs / Incognito grouping
            - Full settings: JavaScript, Images, Desktop Mode, Dark Mode, Ad Blocker, Safe Browsing, 6 search engines
            - Multi-language support (English & French)
            - Download manager with notification support
            - Safe browsing & HTTPS enforcement
            - Ultra Fast Mode

            ### Installation
            Download `app-debug.apk` and install on your Android device (API 24+).
            Enable **Install from unknown sources** if needed.

            > Built from commit: `${{ github.sha }}`
          files: apks/app-debug.apk
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
